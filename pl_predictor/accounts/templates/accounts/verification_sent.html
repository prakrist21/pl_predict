{% extends 'base.html' %}

{% block title %}Verify your email{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 text-center">
    <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 p-8">
        <h2 class="text-2xl font-bold text-emerald-400 mb-4">Check your email</h2>
        <p class="text-gray-400 mb-6">We've sent a verification link to your email address. Click the link to activate your account.</p>
        <p class="text-sm text-gray-500">You can close this page.</p>
    </div>
</div>
{% endblock %}
