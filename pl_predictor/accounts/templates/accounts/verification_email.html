<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0;padding:0;background-color:#0f172a;font-family:Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f172a;padding:40px 20px;">
        <tr>
            <td align="center">
                <table width="480" cellpadding="0" cellspacing="0" style="background-color:#1e293b;border-radius:16px;border:1px solid #334155;overflow:hidden;">
                    <tr>
                        <td style="padding:40px 36px 32px;text-align:center;">
                            <h1 style="color:#34d399;font-size:28px;margin:0 0 8px;">PL Predictor</h1>
                            <p style="color:#94a3b8;font-size:15px;margin:0 0 24px;">Verify your email to get started</p>
                            <p style="color:#cbd5e1;font-size:14px;line-height:1.6;margin:0 0 28px;">
                                Thanks for registering, <strong style="color:#f1f5f9;">{{ username }}</strong>!<br>
                                Click the button below to confirm your account and start predicting.
                            </p>
                            <a href="{{ verify_url }}" style="display:inline-block;background-color:#059669;color:#fff;font-size:16px;font-weight:600;padding:14px 36px;border-radius:10px;text-decoration:none;">Verify Email</a>
                            <p style="color:#64748b;font-size:12px;margin:28px 0 0;">If you didn't create this account, you can ignore this email.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color:#0f172a;padding:16px 36px;text-align:center;">
                            <p style="color:#475569;font-size:11px;margin:0;">PL Predictor &middot; Premier League Score Predictions</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
