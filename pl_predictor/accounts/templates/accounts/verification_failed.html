{% extends 'base.html' %}

{% block title %}Verification failed{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 text-center">
    <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 p-8">
        <h2 class="text-2xl font-bold text-red-400 mb-4">Verification failed</h2>
        <p class="text-gray-400 mb-6">The verification link is invalid or has expired.</p>
        <a href="{% url 'register' %}" class="text-emerald-400 hover:text-emerald-300 font-medium">Register again</a>
    </div>
</div>
{% endblock %}
