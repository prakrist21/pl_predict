{% extends 'base.html' %}

{% block title %}Create League — PL Predictor{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 p-8">
        <h2 class="text-2xl font-bold text-emerald-400 mb-6 text-center">Create League</h2>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2 px-4 rounded-lg transition">Create League</button>
        </form>
    </div>
</div>
{% endblock %}
