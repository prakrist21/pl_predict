<!DOCTYPE html>
<html lang="en" class="bg-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PL Predictor{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        form p { margin: 0 0 1.25rem 0; padding: 0; }
        input, select, textarea {
            width: 100%;
            background-color: #334155;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 0.625rem 1rem;
            color: #fff;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 1px #10b981;
        }
        input::placeholder, select::placeholder, textarea::placeholder {
            color: #94a3b8;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #d1d5db;
            margin-bottom: 0.375rem;
        }
        .errorlist {
            color: #f87171;
            font-size: 0.875rem;
            list-style: none;
            padding: 0;
            margin: 0 0 0.5rem 0;
        }
        .helptext {
            font-size: 0.75rem;
            color: #6b7280;
            margin-top: 0.25rem;
            display: block;
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <nav class="bg-slate-800 border-b border-emerald-600">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="text-xl font-bold text-emerald-400 tracking-tight">PL Predictor</a>
                {% if user.is_authenticated %}
                <button id="menu-btn" class="md:hidden text-gray-300 hover:text-white focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <div class="hidden md:flex items-center space-x-6">
                    <a href="{% url 'my_leagues' %}" class="text-gray-300 hover:text-emerald-400 transition text-sm font-medium">My Leagues</a>
                    <a href="{% url 'create_league' %}" class="text-gray-300 hover:text-emerald-400 transition text-sm font-medium">Create League</a>
                    <a href="{% url 'join_league' %}" class="text-gray-300 hover:text-emerald-400 transition text-sm font-medium">Join League</a>
                    <form method="POST" action="{% url 'logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-gray-300 hover:text-emerald-400 transition text-sm font-medium cursor-pointer bg-transparent border-none p-0">Logout</button>
                    </form>
                </div>
                {% endif %}
            </div>
            {% if user.is_authenticated %}
            <div id="mobile-menu" class="hidden md:hidden pb-4 space-y-1">
                <a href="{% url 'my_leagues' %}" class="block py-2 text-gray-300 hover:text-emerald-400 transition text-sm font-medium">My Leagues</a>
                <a href="{% url 'create_league' %}" class="block py-2 text-gray-300 hover:text-emerald-400 transition text-sm font-medium">Create League</a>
                <a href="{% url 'join_league' %}" class="block py-2 text-gray-300 hover:text-emerald-400 transition text-sm font-medium">Join League</a>
                <form method="POST" action="{% url 'logout' %}" class="block">
                    {% csrf_token %}
                    <button type="submit" class="block py-2 text-gray-300 hover:text-emerald-400 transition text-sm font-medium cursor-pointer bg-transparent border-none w-full text-left">Logout</button>
                </form>
            </div>
            {% endif %}
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
    <script>
        document.getElementById('menu-btn')?.addEventListener('click', function() {
            document.getElementById('mobile-menu')?.classList.toggle('hidden');
        });
    </script>
</body>
</html>
